<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تسجيل الدخول</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tahoma','Arial',sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A0A0A;padding:20px}
.box{background:#1a0a0d;border:2px solid #5C0F1F;border-radius:20px;padding:50px 40px;max-width:420px;width:100%;text-align:center;box-shadow:0 0 60px rgba(92,15,31,0.5)}
.logo{width:90px;height:90px;background:#5C0F1F;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:40px;border:3px solid #C9A55C}
h1{color:#fff;font-size:24px;margin-bottom:8px}
p.sub{color:#C9A55C;margin-bottom:30px;font-size:14px}
.fld{margin-bottom:15px;text-align:right}
label{display:block;color:#E8E8E8;margin-bottom:8px;font-weight:bold;font-size:14px}
input{width:100%;padding:13px 14px;background:#0A0A0A;border:1px solid #333;border-radius:8px;color:#fff;font-size:15px;outline:none}
input:focus{border-color:#8B1538}
button{width:100%;padding:14px;background:#5C0F1F;color:#fff;border:1px solid #8B1538;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px;transition:0.3s}
button:hover{background:#8B1538}
#msg{margin-top:20px;padding:12px;border-radius:8px;font-size:14px;display:none}
.ok{background:#16a34a;color:#fff}
.err{background:#dc2626;color:#fff}
</style>
</head>
<body>

<div class="box">
    <div class="logo">🛡️</div>
    <h1>لوحة التحكم</h1>
    <p class="sub">القائد مصطفى ياسين الدن</p>
    
    <div class="fld">
        <label>اسم المستخدم</label>
        <input type="text" id="u" placeholder="admin" autocomplete="username">
    </div>
    
    <div class="fld">
        <label>كلمة المرور</label>
        <input type="password" id="p" placeholder="••••••••" autocomplete="current-password">
    </div>
    
    <button id="btn">تسجيل الدخول</button>
    
    <div id="msg"></div>
</div>

<script>
(function(){
    var USERNAME = 'admin';
    var PASSWORD = 'admin123';
    
    var btn = document.getElementById('btn');
    var userInput = document.getElementById('u');
    var passInput = document.getElementById('p');
    var msg = document.getElementById('msg');
    
    function doLogin() {
        var u = userInput.value.trim();
        var p = passInput.value;
        
        if (u === USERNAME && p === PASSWORD) {
            try {
                sessionStorage.setItem('mostafa_admin_logged_in', 'yes');
            } catch(e) {}
            msg.style.display = 'block';
            msg.className = 'ok';
            msg.textContent = '✅ تم الدخول بنجاح، جاري التحويل...';
            setTimeout(function(){
                window.location.href = 'admin.html';
            }, 600);
        } else {
            msg.style.display = 'block';
            msg.className = 'err';
            msg.textContent = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
            passInput.value = '';
            passInput.focus();
        }
    }
    
    btn.addEventListener('click', doLogin);
    userInput.addEventListener('keypress', function(e){ if(e.key === 'Enter') doLogin(); });
    passInput.addEventListener('keypress', function(e){ if(e.key === 'Enter') doLogin(); });
    
    userInput.focus();
})();
</script>

</body>
</html>
